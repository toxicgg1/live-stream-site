<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RCB vs SRH Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b0b0b, #1a1a1a);
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    img {
      width: 140px;
      margin-top: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    #timer {
      font-size: 18px;
      color: #ffd700;
      margin-bottom: 15px;
    }

    .btn {
      padding: 14px 25px;
      background: linear-gradient(45deg, red, orange);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    #player {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 95%;
      height: 320px;
      border-radius: 10px;
      border: none;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .popup-box {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="container">

  <!-- IPL Logo FIXED -->
  <img src="https://i.imgur.com/9Q9Z1Zm.png" alt="IPL Logo">

  <h1>🔥 RCB vs SRH Live Match</h1>

  <div id="timer">Match starting soon...</div>

  <button class="btn" onclick="openPopup()">▶ Watch Live</button>

  <div id="player">
    <h2>LIVE 🔴</h2>
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
  </div>

</div>

<!-- TELEGRAM POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>Join Telegram to Watch</h2>
    <a href="https://t.me/sportsyaariii" target="_blank">
      <button class="btn">Join Channel</button>
    </a>
    <br><br>
    <button class="btn" onclick="unlock()">I Joined</button>
  </div>
</div>

<script>
  function openPopup() {
    document.getElementById("popup").style.display = "flex";
  }

  function unlock() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("player").style.display = "block";
  }

  // Countdown Timer
  var countDownDate = new Date("March 30, 2026 19:30:00").getTime();

  var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;

    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("timer").innerHTML =
      "Starts in: " + hours + "h " + minutes + "m " + seconds + "s ";

    if (distance < 0) {
      clearInterval(x);
      document.getElementById("timer").innerHTML = "Match LIVE 🔴";
    }
  }, 1000);
</script>

</body>
</html>
