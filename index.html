<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Live Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0b1c3d, #1b263b, #000);
  color: white;
  text-align: center;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

header img {
  height: 45px;
}

header h1 {
  color: gold;
}

/* MATCH CARD */
.match-card {
  margin: 25px;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(145deg, #111, #1c1c1c);
  box-shadow: 0 0 30px rgba(255,0,0,0.5);
}

.teams {
  font-size: 24px;
  font-weight: bold;
}

.live {
  color: red;
  margin-top: 10px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* BUTTON */
.btn {
  padding: 14px 30px;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 30px;
  color: white;
  font-size: 18px;
  margin-top: 20px;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.1);
}

/* PLAYER */
#player {
  display: none;
  margin-top: 20px;
}

iframe {
  width: 92%;
  height: 320px;
  border-radius: 15px;
}

/* 🔥 NEW PREMIUM POPUP */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: linear-gradient(135deg, #111, #1a1a1a);
  padding: 30px;
  border-radius: 20px;
  width: 85%;
  max-width: 350px;
  box-shadow: 0 0 25px rgba(255,0,0,0.7);
  animation: popupFade 0.4s ease;
}

@keyframes popupFade {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.popup-box h2 {
  margin-bottom: 15px;
}

.telegram-btn {
  background: linear-gradient(45deg, #0088cc, #00c6ff);
}

.small-text {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 10px;
}

/* TEAM LOGOS */
.team-logos {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

.team-logos img {
  height: 50px;
}
</style>
</head>

<body>

<header>
  <!-- ✅ IPL LOGO FIXED -->
  <img src="https://upload.wikimedia.org/wikipedia/en/2/25/Indian_Premier_League_Logo.svg">
  <h1>IPL Live Streaming</h1>
</header>

<div class="match-card">

  <!-- 🔥 TEAM LOGOS -->
  <div class="team-logos">
    <img src="https://upload.wikimedia.org/wikipedia/en/4/4a/Royal_Challengers_Bangalore_Logo.svg">
    <img src="https://upload.wikimedia.org/wikipedia/en/8/81/Sunrisers_Hyderabad_Logo.svg">
  </div>

  <div class="teams">RCB vs SRH</div>
  <div class="live">LIVE NOW 🔴</div>

  <button class="btn" onclick="openPopup()">Watch Live</button>
</div>

<div id="player">
  <h2>LIVE 🔴</h2>
  <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
</div>

<!-- 🔥 PREMIUM TELEGRAM POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>🚀 Unlock Live Match</h2>
    <p>Join our Telegram channel to watch the match</p>

    <a href="https://t.me/Boundarybreakers1" target="_blank">
      <button class="btn telegram-btn">Join Telegram</button>
    </a>

    <button class="btn" onclick="unlock()">I Joined</button>

    <div class="small-text">Click "I Joined" after joining</div>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function unlock() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("player").style.display = "block";
}
</script>

</body>
</html>
