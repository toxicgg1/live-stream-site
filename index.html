<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Match Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .btn {
      padding: 12px 20px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    #player {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 90%;
      height: 300px;
      border: none;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .popup-box {
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>🔥 IPL Live Match</h1>

  <button class="btn" onclick="openPopup()">Watch Live</button>

  <div id="player">
    <h2>LIVE 🔴</h2>
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
  </div>

  <div id="popup">
    <div class="popup-box">
      <h2>Join Telegram to Watch</h2>

      <!-- ✅ UPDATED TELEGRAM LINK -->
      <a href="https://t.me/Boundarybreakers1" target="_blank">
        <button class="btn">Join Channel</button>
      </a>

      <br><br>
      <button class="btn" onclick="unlock()">I Joined</button>
    </div>
  </div>

  <script>
    function openPopup() {
      document.getElementById("popup").style.display = "flex";
    }

    function unlock() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("player").style.display = "block";
    }
  </script>

</body>
</html>
