<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Match Streaming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b0b0b, #1a1a1a);
      color: white;
      text-align: center;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      background: #111;
      box-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    header img {
      height: 40px;
    }

    h1 {
      color: gold;
      font-size: 20px;
    }

    .match-card {
      margin: 20px;
      padding: 20px;
      background: #111;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }

    .teams {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .live {
      color: red;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(45deg, red, orange);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 16px;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    #player {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 90%;
      height: 300px;
      border-radius: 10px;
      border: none;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-box {
      background: #111;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px red;
    }
  </style>
</head>

<body>

  <!-- 🔥 HEADER WITH IPL LOGO -->
  <header>
    <img src="https://upload.wikimedia.org/wikipedia/en/2/25/Indian_Premier_League_Logo.svg">
    <h1>IPL Live Streaming</h1>
  </header>

  <!-- 🏏 MATCH CARD -->
  <div class="match-card">
    <div class="teams">
      🔴 RCB vs SRH 🟠
    </div>
    <div class="live">LIVE NOW</div>

    <button class="btn" onclick="openPopup()">Watch Live</button>
  </div>

  <!-- 🎥 PLAYER -->
  <div id="player">
    <h2>LIVE 🔴</h2>
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
  </div>

  <!-- 🔐 TELEGRAM POPUP -->
  <div id="popup">
    <div class="popup-box">
      <h2>Join Telegram to Watch</h2>

      <a href="https://t.me/Boundarybreakers1" target="_blank">
        <button class="btn">Join Channel</button>
      </a>

      <br><br>
      <button class="btn" onclick="unlock()">I Joined</button>
    </div>
  </div>

  <script>
    function openPopup() {
      document.getElementById("popup").style.display = "flex";
    }

    function unlock() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("player").style.display = "block";
    }
  </script>

</body>
</html>
