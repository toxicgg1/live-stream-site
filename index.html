<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Live Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0b1c3d, #1b263b, #000, #142850);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
  text-align: center;
}

/* BACKGROUND ANIMATION */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border-bottom: 2px solid rgba(255,215,0,0.3);
  box-shadow: 0 0 15px rgba(255,215,0,0.5);
}

header img {
  height: 45px;
}

/* MATCH CARD (GLASS EFFECT ADDED) */
.match-card {
  margin: 25px;
  padding: 25px;
  border-radius: 20px;
  background: #111;
  box-shadow: 0 0 20px red;

  /* NEW ADD */
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* HOVER */
.match-card:hover {
  transform: scale(1.03);
  transition: 0.3s;
  box-shadow: 0 0 40px red;
}

/* TEAM LOGOS */
.team-logos {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

.team-logos img {
  height: 60px;
  background: black;
  padding: 5px;
  border-radius: 10px;
  transition: 0.3s;
}

/* LOGO GLOW */
.team-logos img:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px gold;
}

/* TEXT */
.teams {
  font-size: 22px;
  font-weight: bold;
}

.live {
  color: red;
  font-weight: bold;
  font-size: 18px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 25px;
  color: white;
  font-size: 16px;
  margin-top: 15px;
  cursor: pointer;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 15px rgba(255,0,0,0.7);
}

/* BUTTON HOVER BLAST */
.btn:hover {
  transform: scale(1.12);
  box-shadow: 0 0 25px orange, 0 0 40px red;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* PLAYER */
#player {
  display: none;
  margin-top: 20px;
}

iframe {
  width: 90%;
  height: 300px;
  border-radius: 10px;
  border: none;
}

/* POPUP */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px red;
}
</style>
</head>

<body>

<header>
  <img src="ipl.png">
  <h2>IPL Live Streaming</h2>
</header>

<div class="match-card">
  <div class="team-logos">
    <img src="rcb.jpg">
    <img src="srh.jpg">
  </div>

  <div class="teams">RCB vs SRH</div>
  <div class="live">LIVE NOW 🔴</div>

  <button class="btn" onclick="openPopup()">Watch Live</button>
</div>

<div id="player">
  <h2>LIVE 🔴</h2>
  <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
</div>

<div id="popup">
  <div class="popup-box">
    <h2>Join Telegram to Watch</h2>

    <a href="https://t.me/Boundarybreakers1" target="_blank">
      <button class="btn">Join Channel</button>
    </a>

    <br><br>
    <button class="btn" onclick="unlock()">I Joined</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function unlock() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("player").style.display = "block";
}
</script>

</body>
</html>
