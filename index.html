<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Live Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #0b1c3d, #1b263b, #000, #142850);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
  color: white;
  text-align: center;
}

/* 🔥 SMOOTH BACKGROUND ANIMATION */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
}

header img {
  height: 45px;
  border-radius: 8px;
}

/* MATCH CARD */
.match-card {
  margin: 25px;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(145deg, #111, #1c1c1c);
  box-shadow: 0 0 30px rgba(255,0,0,0.5);
}

/* TEAM LOGOS */
.team-logos {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  margin-bottom: 15px;
}

.team-logos img {
  height: 65px;
  width: auto;
  border-radius: 10px;
  background: #000;
  padding: 5px;
}

/* TEXT */
.teams {
  font-size: 22px;
  font-weight: bold;
}

.live {
  color: red;
  margin-top: 8px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* BUTTON */
.btn {
  padding: 14px 30px;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 30px;
  color: white;
  font-size: 18px;
  margin-top: 20px;
  cursor: pointer;
}

/* PLAYER */
#player {
  display: none;
  margin-top: 20px;
}

iframe {
  width: 92%;
  height: 320px;
  border-radius: 15px;
}

/* POPUP */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #111;
  padding: 30px;
  border-radius: 20px;
  width: 85%;
  max-width: 350px;
  box-shadow: 0 0 25px red;
}
</style>
</head>

<body>

<header>
  <img src="ipl.png">
  <h1 style="color: gold;">IPL Live Streaming</h1>
</header>

<div class="match-card">

  <div class="team-logos">
    <img src="rcb.jpg">
    <img src="srh.jpg">
  </div>

  <div class="teams">RCB vs SRH</div>
  <div class="live">LIVE NOW 🔴</div>

  <button class="btn" onclick="openPopup()">Watch Live</button>
</div>

<div id="player">
  <h2>LIVE 🔴</h2>
  <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
</div>

<div id="popup">
  <div class="popup-box">
    <h2>Join Telegram to Watch</h2>

    <a href="https://t.me/Boundarybreakers1" target="_blank">
      <button class="btn">Join Channel</button>
    </a>

    <br><br>
    <button class="btn" onclick="unlock()">I Joined</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function unlock() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("player").style.display = "block";
}
</script>

</body>
</html>
