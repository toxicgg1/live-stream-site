<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RCB vs SRH Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 10px;
    }

    img {
      width: 120px;
      margin-top: 10px;
    }

    .btn {
      padding: 12px 20px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    #player {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 90%;
      height: 300px;
      border: none;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .popup-box {
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }

    #timer {
      font-size: 20px;
      margin-top: 10px;
      color: yellow;
    }
  </style>
</head>

<body>

  <!-- IPL Logo -->
  <img src="https://upload.wikimedia.org/wikipedia/en/2/25/Indian_Premier_League_Logo.svg">

  <h1>🔥 RCB vs SRH Live Match</h1>

  <!-- Countdown -->
  <div id="timer">Match starting soon...</div>

  <button class="btn" onclick="openPopup()">Watch Live</button>

  <div id="player">
    <h2>LIVE 🔴</h2>
    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
  </div>

  <div id="popup">
    <div class="popup-box">
      <h2>Join Telegram to Watch</h2>
      <a href="https://t.me/sportsyaariii" target="_blank">
        <button class="btn">Join Channel</button>
      </a>
      <br><br>
      <button class="btn" onclick="unlock()">I Joined</button>
    </div>
  </div>

  <script>
    function openPopup() {
      document.getElementById("popup").style.display = "flex";
    }

    function unlock() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("player").style.display = "block";
    }

    // Countdown Timer (edit time if needed)
    var countDownDate = new Date("March 30, 2026 19:30:00").getTime();

    var x = setInterval(function() {
      var now = new Date().getTime();
      var distance = countDownDate - now;

      var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("timer").innerHTML =
        "Starts in: " + hours + "h " + minutes + "m " + seconds + "s ";

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("timer").innerHTML = "Match LIVE 🔴";
      }
    }, 1000);
  </script>

</body>
</html>
