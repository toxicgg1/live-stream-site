<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Live Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0b1c3d, #1b263b, #000);
  color: white;
  text-align: center;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 15px rgba(255,215,0,0.5);
}

header img {
  height: 45px;
}

header h1 {
  color: gold;
  font-size: 20px;
}

/* MATCH CARD */
.match-card {
  margin: 25px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.teams {
  font-size: 24px;
  font-weight: bold;
}

.live {
  color: red;
  margin-top: 10px;
  font-weight: bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* BUTTON */
.btn {
  padding: 14px 30px;
  background: linear-gradient(45deg, red, orange);
  border: none;
  border-radius: 30px;
  color: white;
  font-size: 18px;
  margin-top: 20px;
  cursor: pointer;
}

.btn:hover {
  transform: scale(1.1);
}

/* PLAYER */
#player {
  display: none;
  margin-top: 20px;
}

iframe {
  width: 92%;
  height: 320px;
  border-radius: 15px;
  border: none;
  box-shadow: 0 0 20px black;
}

/* POPUP */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #111;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 20px red;
}
</style>
</head>

<body>

<header>
  <!-- ✅ FIXED LOGO -->
  <img src="https://upload.wikimedia.org/wikipedia/en/2/25/Indian_Premier_League_Logo.svg">
  <h1>IPL Live Streaming</h1>
</header>

<div class="match-card">
  <div class="teams">🔴 RCB vs SRH 🟠</div>
  <div class="live">LIVE NOW</div>

  <button class="btn" onclick="openPopup()">Watch Live</button>
</div>

<div id="player">
  <h2>LIVE 🔴</h2>
  <iframe src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"></iframe>
</div>

<div id="popup">
  <div class="popup-box">
    <h2>Join Telegram to Watch</h2>

    <a href="https://t.me/Boundarybreakers1" target="_blank">
      <button class="btn">Join Channel</button>
    </a>

    <br><br>
    <button class="btn" onclick="unlock()">I Joined</button>
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function unlock() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("player").style.display = "block";
}
</script>

</body>
</html>
